<div class="container">

<h1>무릎이 뻣뻣할 때 확인해볼 생활 습관 (50대 기준)</h1>

<p>요즘 무릎이 불편하신가요?</p>

<p>생활 습관에 따라 충분히 개선될 수 있는 부분도 있습니다.</p>

<h2>왜 무릎이 불편해질까요?</h2>

<p>활동량 감소와 근육 약화가 주요 원인입니다.</p>

<h2>먼저 확인해볼 수 있는 3가지</h2>

<h3>1. 걷는 시간 부족</h3>
<p>걷는 시간이 줄면 근육이 약해집니다.</p>

<h3>2. 오래 앉아있기</h3>
<p>장시간 앉아있으면 무릎이 뻣뻣해집니다.</p>

<h3>3. 체중 증가</h3>
<p>체중이 늘면 무릎 부담이 커집니다.</p>

<h2>작은 습관부터 시작</h2>

<ul>
<li>매일 걷기</li>
<li>자주 일어나기</li>
<li>스트레칭</li>
</ul>

</div>
